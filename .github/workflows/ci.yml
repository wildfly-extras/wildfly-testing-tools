# This workflow will build a Java project with Maven
# For more information see: https://help.github.com/actions/language-and-framework-guides/building-and-testing-java-with-maven

name: WildFly Testing Tools - CI

on:
  push:
    branches-ignore:
      - 'dependabot/**'
  pull_request:
    paths:
      - '.github/workflows/ci.yml'
      - 'api/**'
      - 'boms/**'
      - 'extension/**'
      - 'tools/**'
      - '**/pom.xml'
  schedule:
    - cron: '0 0 * * *' # Every day at 00:00 UTC

# Only run the latest job
concurrency:
  group: '${{ github.workflow }} @ ${{ github.event.pull_request.head.label || github.head_ref || github.ref }}'
  cancel-in-progress: true

env:
  MVN_CMD: './mvnw -V -B'

jobs:
  format-check:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: 'temurin'
          cache: 'maven'
      - name: Validate Formatting
        run: |
          mvn -B validate -Pformat-check -Denforcer.skip=true

  build:
    name: '${{ matrix.os }}-jdk${{ matrix.java }}'
    needs: format-check
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ 'ubuntu-latest' , 'windows-latest',  'macos-latest' ]

    steps:
      - uses: actions/checkout@v6
      - name: Set up JDKs
        uses: actions/setup-java@v5
        with:
          cache: 'maven'
          distribution: 'temurin'
          java-version: |
            17
            21
            26-ea
            25
      - name: Build and Test on ${{ matrix.os }} - Java 25
        run: ${{ env.MVN_CMD }} clean verify
      - name: Build and Test on ${{ matrix.os }} - Java 26
        run: ${{ env.MVN_CMD }} verify '-Dtest.java.home=${{env.JAVA_HOME_26_X64}}${{env.JAVA_HOME_26_ARM64}}' '-Dsurefire.reportsDirectory=target/surefire-reports-java26' '-Dfailsafe.reportsDirectory=target/failsafe-reports-java26'
      - name: Build and Test on ${{ matrix.os }} - Java 21
        run: ${{ env.MVN_CMD }} verify '-Dtest.java.home=${{env.JAVA_HOME_21_X64}}${{env.JAVA_HOME_21_ARM64}}' '-Dsurefire.reportsDirectory=target/surefire-reports-java21' '-Dfailsafe.reportsDirectory=target/failsafe-reports-java21'
      - name: Build and Test on ${{ matrix.os }} - Java 17
        run: ${{ env.MVN_CMD }} verify '-Dtest.java.home=${{env.JAVA_HOME_17_X64}}${{env.JAVA_HOME_17_ARM64}}' '-Dsurefire.reportsDirectory=target/surefire-reports-java17' '-Dfailsafe.reportsDirectory=target/failsafe-reports-java17'
      - name: Upload test logs for failed run
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: test-reports-${{ matrix.os }}
          path: |
            **/*.log
            **/surefire-reports*/**
            **/failsafe-reports*/**